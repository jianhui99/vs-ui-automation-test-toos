id: TC10
title: Template Default Target Framework via Visual Studio UI
priority: P0
feature: Templates
classification: BVT
tags: [template, tfm, new-project, default-framework]

targets:
  arch: [x64, arm64]
  vs: ["18.0"]

data:
  workDir: "${WorkDir_Root}/TC10"
  template: "Console App"
  projectName: "Tc10TemplateDefaultTfm"
  expectedLtsTfm: "net11.0"   # latest supported .NET LTS at time of test

config:
  onFailure: stop
  timeoutSeconds: 600
  retries: 1

steps:
  - action: launch_vs
    name: Launch Visual Studio with a clean user hive
    with:
      version: "${targets.vs[0]}"
      cleanInstance: true   # ensures "first project" TFM default applies

  - action: new_project
    name: Open the New Project dialog and select template
    with:
      template: "${data.template}"
      name: "${data.projectName}"
      location: "${data.workDir}"
    assert:
      # Primary assertion: read the generated csproj — ground truth for the chosen TFM.
      - type: csproj_property
        project: "${data.workDir}/${data.projectName}/${data.projectName}.csproj"
        property: TargetFramework
        equals: "${data.expectedLtsTfm}"

  - action: screenshot
    name: Capture New Project dialog and resulting project state
    with:
      label: tc10-new-project

  # Advisory AI check: confirm the Framework dropdown in the dialog showed the expected LTS value.
  - action: wait_for
    name: AI advisory — verify dialog showed correct default TFM
    with:
      seconds: 1
    assert:
      - type: ai_visual
        advisory: true
        prompt: >
          Confirm that the Target Framework dropdown in the New Project dialog
          defaulted to the latest LTS release ("${data.expectedLtsTfm}").
          If the dialog selected a preview or older release instead, flag it as a bug candidate.
